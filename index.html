<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FLAPPY KANYE / TURRELL CHAMBERS</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="stage">
    <canvas id="bg" width="540" height="960"></canvas>
    <canvas id="game" width="540" height="960"></canvas>
    <svg id="kanye" class="kanye" viewBox="-40 -40 80 80" width="80" height="80" aria-hidden="true">
  <g id="k-root">
    <!-- back-to-front layers -->
    <ellipse id="k-shadow" cx="0" cy="34" rx="22" ry="4" fill="rgba(0,0,0,0.35)"/>

    <!-- ears, tucked behind head -->
    <ellipse cx="-25" cy="2" rx="3" ry="4" fill="#8a5d3d"/>
    <ellipse cx="25" cy="2" rx="3" ry="4" fill="#8a5d3d"/>

    <!-- shoulders / hoodie collar peek -->
    <g id="k-body">
      <path d="M -24 30 Q 0 42 24 30 L 26 40 L -26 40 Z" fill="#1a1a1a"/>
      <path d="M -10 28 L -8 34 L 8 34 L 10 28 Z" fill="#ebe6dc"/>
    </g>

    <!-- head shape (south park kanye is round-ish with a slight squared jaw) -->
    <g id="k-head">
      <path d="M -25 -8 Q -27 14 -22 22 Q -10 30 0 30 Q 10 30 22 22 Q 27 14 25 -8 Z" fill="#a8754f"/>
    </g>

    <!-- jaw — the lower face slab that drops on flap/death (mouth + teeth + goatee live here) -->
    <g id="k-jaw" transform="translate(0 0)">
      <!-- goatee (chin + below-lip strip) -->
      <path d="M -8 18 Q 0 28 8 18 Q 6 22 0 23 Q -6 22 -8 18 Z" fill="#0a0a0a"/>
      <rect x="-3" y="13" width="6" height="3" fill="#0a0a0a"/>
      <!-- open mouth with teeth (south park gormless look) -->
      <path id="k-mouth" d="M -7 14 Q 0 19 7 14 L 6 17 L -6 17 Z" fill="#3a1f0f"/>
      <rect x="-5" y="14.4" width="10" height="1.5" fill="#ebe6dc"/>
      <line x1="-2.5" y1="14.4" x2="-2.5" y2="15.9" stroke="#3a1f0f" stroke-width="0.4"/>
      <line x1="0"    y1="14.4" x2="0"    y2="15.9" stroke="#3a1f0f" stroke-width="0.4"/>
      <line x1="2.5"  y1="14.4" x2="2.5"  y2="15.9" stroke="#3a1f0f" stroke-width="0.4"/>
    </g>

    <!-- nose -->
    <path d="M -2 4 Q 0 9 2 4" stroke="#7a4a2a" stroke-width="1.3" fill="none" stroke-linecap="round"/>

    <!-- hair — flat-top with hairline. This element keeps id k-cap so the rig
         code keeps tilting it for liveliness. -->
    <g id="k-cap" transform="rotate(0)">
      <path d="M -26 -8 Q -27 -22 -18 -26 Q 0 -30 18 -26 Q 27 -22 26 -8 Q 24 -12 16 -12 L -16 -12 Q -24 -12 -26 -8 Z" fill="#0a0a0a"/>
      <!-- hairline edge above forehead -->
      <path d="M -20 -10 Q 0 -14 20 -10" stroke="#1a1a1a" stroke-width="0.6" fill="none"/>
      <!-- side fade hints -->
      <path d="M -24 -4 Q -26 -8 -24 -12" stroke="#0a0a0a" stroke-width="1" fill="none"/>
      <path d="M 24 -4 Q 26 -8 24 -12" stroke="#0a0a0a" stroke-width="1" fill="none"/>
    </g>

    <!-- shutter shades — round red frame, classic Yeezy/glow-in-the-dark era -->
    <g id="k-glasses">
      <!-- bright outer frame -->
      <circle cx="-11" cy="0" r="8.5" fill="#c8221b" stroke="#0a0a0a" stroke-width="0.8"/>
      <circle cx="11"  cy="0" r="8.5" fill="#c8221b" stroke="#0a0a0a" stroke-width="0.8"/>
      <!-- bridge -->
      <rect x="-3" y="-1" width="6" height="2" fill="#c8221b"/>
      <!-- dark lens slabs sit inside the round frame so slats render against black -->
      <circle cx="-11" cy="0" r="6.5" fill="#0a0a0a"/>
      <circle cx="11"  cy="0" r="6.5" fill="#0a0a0a"/>
      <!-- shutter slats — drawn as horizontal lines, accent color drives crossfade -->
      <g id="k-slats" stroke="#c8221b" stroke-width="0.9" stroke-linecap="round">
        <line x1="-17" y1="-3" x2="-5" y2="-3"/>
        <line x1="-17" y1="-1" x2="-5" y2="-1"/>
        <line x1="-17" y1="1"  x2="-5" y2="1"/>
        <line x1="-17" y1="3"  x2="-5" y2="3"/>
        <line x1="5"   y1="-3" x2="17" y2="-3"/>
        <line x1="5"   y1="-1" x2="17" y2="-1"/>
        <line x1="5"   y1="1"  x2="17" y2="1"/>
        <line x1="5"   y1="3"  x2="17" y2="3"/>
      </g>
      <!-- glint sweeps left-to-right across both lenses on every flap -->
      <rect id="k-glint" x="-18" y="-6" width="4" height="12" fill="rgba(255,255,255,0.55)" opacity="0"/>
    </g>
  </g>
</svg>
    <div class="hud">
      <div class="top">
        <div>FLAPPY KANYE</div>
        <button id="mute-btn" class="mute-btn" type="button">SOUND ON</button>
        <div id="chamber">CHAMBER I</div>
      </div>
      <div class="score" id="score">0</div>
      <div class="bottom">
        <div>BEST <span id="best">0</span></div>
        <div>TURRELL / YEEZUS / DONDA</div>
      </div>
    </div>
    <div class="overlay" id="overlay">
      <div class="title">FLAPPY<br/><span class="red">KANYE</span></div>
      <div class="sub">TAP / SPACE TO FLAP</div>
      <div class="death-chamber" id="death-chamber" style="display:none">CHAMBER COLLAPSED</div>
      <div class="meta">A devotional exercise in flight through the light chambers. Drift between the monoliths. Do not touch the architecture.</div>
    </div>
  </div>
  <div class="credit">A FLAPPY DEVOTIONAL</div>

<script type="module" src="main.js"></script>
</body>
</html>
