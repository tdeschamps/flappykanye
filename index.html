<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FLAPPY KANYE / TURRELL CHAMBERS</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="stage">
    <canvas id="bg"></canvas>
    <canvas id="game"></canvas>
    <img id="kanye-png" class="kanye" src="assets/kanye.png" alt="" aria-hidden="true" style="display:none" />
    <svg id="kanye" class="kanye" viewBox="-38 -134 76 84" width="76" height="84" aria-hidden="true">
  <g id="k-root">
    <!-- Face-only South Park Kanye: head fills the frame, black-top collar with
         silver chains peeks at the bottom edge as a bust cutoff. -->

    <!-- ============ COLLAR (peeks at bottom edge) ============ -->
    <!-- black top with two silver Cuban-link chains; drawn first so the chin
         overlaps it. Sits high enough (y≈-62..-50) to show under the crop. -->
    <g id="k-body">
      <path d="M -38 -62 Q 0 -56 38 -62 L 38 -50 L -38 -50 Z" fill="#0c0c0e"/>
      <path d="M -16 -60 Q 0 -55 16 -60" stroke="#c4c8ce" stroke-width="2.4"
            fill="none" stroke-linecap="round" stroke-dasharray="1.3 1.8"/>
      <path d="M -22 -61 Q 0 -53 22 -61" stroke="#b2b6bd" stroke-width="2.8"
            fill="none" stroke-linecap="round" stroke-dasharray="1.5 2"/>
    </g>

    <!-- ears at mid-head -->
    <ellipse cx="-24" cy="-90" rx="3.6" ry="5.2" fill="#90603f"/>
    <ellipse cx="24" cy="-90" rx="3.6" ry="5.2" fill="#90603f"/>
    <path d="M -24 -92 Q -22 -90 -24 -88" stroke="#6e4126" stroke-width="0.8" fill="none"/>
    <path d="M 24 -92 Q 22 -90 24 -88" stroke="#6e4126" stroke-width="0.8" fill="none"/>

    <!-- head: large rounded rectangle, slightly wider jaw, flat-ish chin -->
    <g id="k-head">
      <path d="M -24 -108
               Q -24.5 -96 -24 -86
               Q -23.5 -74 -19 -68
               Q -11 -62 0 -62
               Q 11 -62 19 -68
               Q 23.5 -74 24 -86
               Q 24.5 -96 24 -108
               Q 13 -114 0 -114
               Q -13 -114 -24 -108 Z" fill="#9b6440"/>
    </g>

    <!-- eyes: big white South Park ovals touching at center, pupils inner -->
    <g id="k-eyes">
      <ellipse cx="-8.5" cy="-92" rx="8.2" ry="9.4" fill="#f4f1ea" stroke="#1a1208" stroke-width="0.7"/>
      <ellipse cx="8.5"  cy="-92" rx="8.2" ry="9.4" fill="#f4f1ea" stroke="#1a1208" stroke-width="0.7"/>
      <circle id="k-pupil-l" cx="-2.4" cy="-90" r="1.9" fill="#0a0a0a"/>
      <circle id="k-pupil-r" cx="2.4"  cy="-90" r="1.9" fill="#0a0a0a"/>
    </g>

    <!-- eyebrows: thick angled black bars just above the eyes -->
    <path d="M -16 -102.5 Q -10.5 -104.8 -4.5 -102 L -5 -100.2 Q -10.5 -102.4 -15.5 -100.6 Z" fill="#0c0c0c"/>
    <path d="M 4.5 -102 Q 10.5 -104.8 16 -102.5 L 15.5 -100.6 Q 10.5 -102.4 5 -100.2 Z" fill="#0c0c0c"/>

    <!-- jaw — small frown + a chin-strap goatee hugging the lower jaw edge.
         Drops slightly on flap/death. -->
    <g id="k-jaw" transform="translate(0 0)">
      <!-- soul patch: thin strip just under the lip -->
      <path d="M -1.6 -77 L 1.6 -77 L 1.2 -73.5 Q 0 -72.8 -1.2 -73.5 Z" fill="#120f0b"/>
      <!-- small closed downturned mouth -->
      <path id="k-mouth" d="M -4 -76.5 Q 0 -78.6 4 -76.5" stroke="#3a2113" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- goatee: a beard band hugging the bottom of the chin (cheeks clear),
           drawn as a crescent so skin shows above it — never an open-mouth oval -->
      <path d="M -9 -70
               Q -9 -64 0 -63
               Q 9 -64 9 -70
               Q 7 -67.5 4 -66.5
               Q 0 -65.8 -4 -66.5
               Q -7 -67.5 -9 -70 Z" fill="#120f0b"/>
    </g>

    <!-- hair: dark afro with an M-shaped widow's-peak hairline; forehead + temple
         notches show. Stippled-looking edge. Keeps id k-cap for rig tilt. -->
    <g id="k-cap" transform="rotate(0)">
      <path d="M -24 -86
               Q -26 -100 -22 -109
               Q -16 -117 -6 -119
               Q 0 -120 6 -119
               Q 16 -117 22 -109
               Q 26 -100 24 -86
               Q 23 -95 19 -100
               Q 16 -103 13 -101
               Q 11 -103 7 -103.5
               Q 3 -103.8 0 -101.5
               Q -3 -103.8 -7 -103.5
               Q -11 -103 -13 -101
               Q -16 -103 -19 -100
               Q -23 -95 -24 -86 Z" fill="#15110d"/>
      <!-- short faded sides over the upper ears -->
      <path d="M -24 -88 Q -24.5 -82 -22 -79 L -19.5 -80 Q -21 -85 -21 -90 Z" fill="#15110d"/>
      <path d="M 24 -88 Q 24.5 -82 22 -79 L 19.5 -80 Q 21 -85 21 -90 Z" fill="#15110d"/>
    </g>
  </g>
</svg>
    <div class="hud">
      <div class="top">
        <div>FLAPPY KANYE</div>
        <button id="mute-btn" class="mute-btn" type="button">SOUND ON</button>
        <div id="chamber">CHAMBER I</div>
      </div>
      <div class="score" id="score">0</div>
      <div class="bottom">
        <div>BEST <span id="best">0</span></div>
        <div>TURRELL / YEEZUS / DONDA</div>
      </div>
    </div>
    <div class="overlay" id="overlay">
      <div class="title">FLAPPY<br/><span class="red">KANYE</span></div>
      <div class="sub">TAP / SPACE TO FLAP</div>
      <div class="death-chamber" id="death-chamber" style="display:none">CHAMBER COLLAPSED</div>
      <div class="meta">A devotional exercise in flight through the light chambers. Drift between the monoliths. Do not touch the architecture.</div>
    </div>
  </div>
  <div class="credit">A FLAPPY DEVOTIONAL</div>

<script type="module" src="main.js"></script>
</body>
</html>
