<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FLAPPY KANYE / TURRELL CHAMBERS</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="stage">
    <canvas id="bg"></canvas>
    <canvas id="game"></canvas>
    <div class="hud">
      <div class="top">
        <div>FLAPPY KANYE</div>
        <button id="mute-btn" class="mute-btn" type="button">SOUND ON</button>
        <div id="chamber">CHAMBER I</div>
      </div>
      <div class="score" id="score">0</div>
      <div class="ego-wrap">
        <div class="ego-track"><div class="ego-bar" id="ego-bar"></div></div>
        <span class="ego-chip" id="ego-chip">EGO ×2</span>
      </div>
      <div class="bottom">
        <div>BEST <span id="best">0</span></div>
        <div>TURRELL / YEEZUS / DONDA</div>
      </div>
    </div>
    <div class="toast hidden" id="toast" aria-hidden="true"></div>
    <div class="era-card hidden" id="era-card" aria-hidden="true">
      <div class="ec-roman" id="ec-roman"></div>
      <div class="ec-album" id="ec-album"></div>
      <div class="ec-meta" id="ec-meta"></div>
    </div>
    <div class="overlay" id="overlay">
      <div class="title">FLAPPY<br/><span class="red">KANYE</span></div>
      <div class="death-block" id="death-block" style="display:none">
        <div class="death-context" id="death-context"></div>
        <div class="death-quote" id="death-quote"></div>
        <div class="death-attr">— YE, PROBABLY</div>
        <div class="death-stats" id="death-stats"></div>
      </div>
      <div class="sub" id="prompt">TAP / SPACE TO FLAP</div>
      <div class="meta" id="overlay-meta">A devotional exercise in flight through the light chambers. Drift between the monoliths. Do not touch the architecture.</div>
    </div>
  </div>
  <div class="credit">A FLAPPY DEVOTIONAL</div>

<script type="module" src="main.js"></script>
</body>
</html>
